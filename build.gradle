
plugins {
    id 'java'
    id 'org.jetbrains.intellij.platform' version '2.16.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

group 'br.com.gitflowhelper'
version '1.1.0'

repositories {
    mavenCentral()

    intellijPlatform {
        defaultRepositories()
    }
}

dependencies {
    intellijPlatform {
        intellijIdeaCommunity('2024.2')
        bundledPlugin('Git4Idea')
    }
}

tasks {
    patchPluginXml {
        sinceBuild = '242'
        untilBuild = null
    }
}